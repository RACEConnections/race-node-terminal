<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>R.A.C.E. | Terminal ARC-001</title>
    <style>
        :root {
            --neon-cyan: #00f3ff;
            --emergency-red: #ff4b2b;
            --inst-gold: #d4af37;
            --bg-black: #050505;
            --terminal-gray: #121212;
        }

        body {
            background-color: var(--bg-black);
            color: var(--neon-cyan);
            font-family: 'JetBrains Mono', 'Courier New', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            transition: border 0.3s ease;
        }

        #terminal-interface {
            width: 90%;
            max-width: 550px;
            background: var(--terminal-gray);
            border: 1px solid var(--neon-cyan);
            padding: 2.5rem;
            position: relative;
            box-shadow: 0 0 30px rgba(0, 0, 0, 1);
        }

        h2 { border-bottom: 2px solid var(--inst-gold); padding-bottom: 10px; color: var(--inst-gold); font-size: 1.2rem; margin-top: 0; }

        .metadata { font-size: 0.7rem; color: #555; margin-bottom: 1.5rem; text-transform: uppercase; }

        .input-group { margin-bottom: 1.2rem; }

        label { display: block; margin-bottom: 0.4rem; font-size: 0.75rem; color: var(--neon-cyan); opacity: 0.8; }

        input, select {
            width: 100%;
            background: #000;
            border: 1px solid #333;
            color: var(--neon-cyan);
            padding: 12px;
            box-sizing: border-box;
            font-family: inherit;
            outline: none;
        }

        input:focus { border-color: var(--inst-gold); }

        button {
            width: 100%;
            padding: 16px;
            background: transparent;
            border: 1px solid var(--neon-cyan);
            color: var(--neon-cyan);
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.2s;
            margin-top: 10px;
        }

        button:hover { background: var(--neon-cyan); color: #000; }

        #status-bar {
            margin-top: 2rem;
            padding: 12px;
            border: 1px dashed #333;
            font-size: 0.85rem;
            background: #000;
            word-break: break-all;
        }

        .emergency-btn { border-color: var(--emergency-red); color: var(--emergency-red); }
        .emergency-btn:hover { background: var(--emergency-red); color: #fff; }

        /* Scanline Overlay */
        #terminal-interface::after {
            content: " ";
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%);
            background-size: 100% 4px;
            pointer-events: none;
        }
    </style>
</head>
<body id="main-body">

<div id="terminal-interface">
    <h2>[ NODE_ARC-001_UPLINK ]</h2>
    <div class="metadata">PROTOCOL: RACE_v5.6.4 // ORIGIN: OMNIF.CARRD.CO</div>
    
    <div class="input-group">
        <label>Sentinel_Liaison_ID</label>
        <input type="text" id="liaisonId" placeholder="AUTH_REQUIRED">
    </div>

    <div id="kilo-sync-section">
        <div class="input-group">
            <label>Asset_Category</label>
            <select id="category">
                <option value="METAL_NON_FERROUS">NON-FERROUS METAL</option>
                <option value="METAL_FERROUS">FERROUS METAL</option>
                <option value="POLY_REFINED">REFINED POLYMER</option>
                <option value="AUDIT_ASSET">INSTITUTIONAL ASSET</option>
            </select>
        </div>
        <div class="input-group">
            <label>Metric_Value (KG)</label>
            <input type="number" id="weight" step="0.01" placeholder="0.00">
        </div>
        <button id="sync-btn" onclick="syncData('KILO')">Authorize Sync</button>
    </div>

    <button class="emergency-btn" onclick="syncData('INCIDENT')">! Report Field Interaction</button>

    <div id="status-bar">STATUS: STANDBY // AWAITING_LIAISON_AUTH</div>
</div>

<script>
    // --- INTEGRATED CORE CONFIGURATION ---
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxheD2FJ8zp7SuB6uLXa3EtwrPlTRCp0TSGMNDNWfj6AsnrF5eFDVxzijioqZmvggE/exec";

    // --- HANDSHAKE LOGIC (CARRD BRIDGE) ---
    window.onload = function() {
        const urlParams = new URLSearchParams(window.location.search);
        const status = document.getElementById('status-bar');
        
        // Check for Emergency Redirect from Carrd
        if (urlParams.get('mode') === 'emergency') {
            document.getElementById('main-body').style.border = "10px solid var(--emergency-red)";
            status.innerHTML = "PROTOCOL_LOCK: EMERGENCY_OVERRIDE_ACTIVE";
            status.style.color = "var(--emergency-red)";
        }
        
        // Auto-Auth if redirected from Secure Link
        if (urlParams.get('liaison_auth') === 'true') {
            status.innerHTML = "STATUS: ENCRYPTED_LINK_VERIFIED";
            status.style.color = "var(--inst-gold)";
        }
    };

    async function syncData(type) {
        const status = document.getElementById('status-bar');
        const liaison = document.getElementById('liaisonId').value;
        
        if (!liaison) {
            status.innerHTML = "ERROR // AUTH_FAILED: NO_LIAISON_ID";
            status.style.color = "var(--emergency-red)";
            return;
        }

        status.innerHTML = "UPLINKING... SECURING_LEDGER_ANCHOR";
        status.style.color = "var(--inst-gold)";

        const params = new URLSearchParams();
        params.append('ReportType', type);
        params.append('Liaison', liaison);

        if (type === 'KILO') {
            params.append('Category', document.getElementById('category').value);
            params.append('Weight', document.getElementById('weight').value);
        } else {
            params.append('IType', 'FIELD_INTERACTION_MODULE_7');
        }

        try {
            const response = await fetch(SCRIPT_URL + "?" + params.toString());
            const result = await response.text();
            
            if (result.includes("SUCCESS")) {
                status.innerHTML = result.replace("SUCCESS // ", "SECURE_HASH: ");
                status.style.color = "var(--neon-cyan)";
                // Reset inputs on success
                document.getElementById('weight').value = "";
            } else {
                throw new Error(result);
            }
        } catch (error) {
            status.innerHTML = "UPLINK_CRITICAL_FAILURE // " + error.message;
            status.style.color = "var(--emergency-red)";
        }
    }
</script>

</body>
</html>
