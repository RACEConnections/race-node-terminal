<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>R.A.C.E. | Terminal ARC-001</title>
    <style>
        :root {
            --neon-cyan: #00f3ff;
            --emergency-red: #ff4b2b;
            --inst-gold: #d4af37;
            --bg-black: #0a0a0a;
            --terminal-gray: #1a1a1a;
        }

        body {
            background-color: var(--bg-black);
            color: var(--neon-cyan);
            font-family: 'JetBrains Mono', 'Courier New', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        #terminal-interface {
            width: 90%;
            max-width: 600px;
            background: var(--terminal-gray);
            border: 2px solid var(--neon-cyan);
            padding: 2rem;
            box-shadow: 0 0 20px rgba(0, 243, 255, 0.2);
            position: relative;
        }

        h2 { border-bottom: 1px solid var(--neon-cyan); padding-bottom: 10px; color: var(--inst-gold); }

        .input-group { margin-bottom: 1.5rem; }

        label { display: block; margin-bottom: 0.5rem; font-size: 0.8rem; text-transform: uppercase; }

        input, select {
            width: 100%;
            background: #000;
            border: 1px solid var(--neon-cyan);
            color: var(--neon-cyan);
            padding: 10px;
            box-sizing: border-box;
            font-family: inherit;
        }

        button {
            width: 100%;
            padding: 15px;
            background: transparent;
            border: 2px solid var(--neon-cyan);
            color: var(--neon-cyan);
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            transition: 0.3s;
        }

        button:hover { background: var(--neon-cyan); color: #000; }

        #status-bar {
            margin-top: 1.5rem;
            padding: 10px;
            border: 1px dashed var(--neon-cyan);
            font-size: 0.9rem;
            min-height: 1.2rem;
        }

        .emergency-btn { border-color: var(--emergency-red); color: var(--emergency-red); margin-top: 10px; }
        .emergency-btn:hover { background: var(--emergency-red); color: #fff; }

        /* Scanline effect */
        #terminal-interface::before {
            content: " ";
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
        }
    </style>
</head>
<body>

<div id="terminal-interface">
    <h2>NODE ARC-001 // UPLINK</h2>
    
    <div class="input-group">
        <label>Sentinel Liaison ID</label>
        <input type="text" id="liaisonId" placeholder="Enter ID...">
    </div>

    <div id="kilo-sync-section">
        <div class="input-group">
            <label>Asset Category</label>
            <select id="category">
                <option value="METAL_COPPER">COPPER / BRASS</option>
                <option value="METAL_IRON">IRON / STEEL</option>
                <option value="POLY_PET">PET PLASTIC</option>
                <option value="INSTITUTIONAL">INSTITUTIONAL GRADE</option>
            </select>
        </div>
        <div class="input-group">
            <label>Kilo Metric (KG)</label>
            <input type="number" id="weight" step="0.1" placeholder="00.0">
        </div>
        <button onclick="syncData('KILO')">Authorize Sync</button>
    </div>

    <button class="emergency-btn" onclick="syncData('INCIDENT')">Report Field Interaction</button>

    <div id="status-bar">SYSTEM_READY // AWAITING_INPUT</div>
</div>

<script>
    // --- CORE CONFIGURATION ---
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxheD2FJ8zp7SuB6uLXa3EtwrPlTRCp0TSGMNDNWfj6AsnrF5eFDVxzijioqZmvggE/exec";

    async function syncData(type) {
        const status = document.getElementById('status-bar');
        const liaison = document.getElementById('liaisonId').value;
        
        if (!liaison) {
            status.innerHTML = "ERROR // LIAISON_ID_REQUIRED";
            status.style.color = "var(--emergency-red)";
            return;
        }

        status.innerHTML = "UPLINKING... DO NOT DISCONNECT";
        status.style.color = "var(--inst-gold)";

        const params = new URLSearchParams();
        params.append('ReportType', type);
        params.append('Liaison', liaison);

        if (type === 'KILO') {
            params.append('Category', document.getElementById('category').value);
            params.append('Weight', document.getElementById('weight').value);
        } else {
            params.append('IType', 'FIELD_AUDIT_TRIGGER');
        }

        try {
            const response = await fetch(SCRIPT_URL + "?" + params.toString());
            const result = await response.text();
            
            if (result.includes("SUCCESS")) {
                status.innerHTML = result; // Displays the REV-ARC Hash
                status.style.color = "var(--neon-cyan)";
            } else {
                throw new Error(result);
            }
        } catch (error) {
            status.innerHTML = "UPLINK_ERROR // " + error.message;
            status.style.color = "var(--emergency-red)";
            console.error(error);
        }
    }
</script>

</body>
</html>
