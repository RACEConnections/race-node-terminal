<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OMNIF | Terminal ARC-001</title>
    <style>
        :root {
            --neon-cyan: #00f3ff;
            --inst-gold: #d4af37;
            --emergency-red: #ff4b2b;
            --bg-black: #050505;
            --surface: #0a0a0a;
        }

        body {
            background-color: var(--bg-black);
            color: var(--neon-cyan);
            font-family: 'JetBrains Mono', 'Courier New', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow-x: hidden;
        }

        #terminal-container {
            width: 90%;
            max-width: 480px;
            background: var(--surface);
            border: 1px solid var(--neon-cyan);
            padding: 2rem;
            position: relative;
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.8);
        }

        h2 { 
            color: var(--inst-gold); 
            border-bottom: 1px solid var(--inst-gold); 
            padding-bottom: 8px; 
            font-size: 1rem; 
            letter-spacing: 2px;
            margin-top: 0;
        }

        .sys-info {
            font-size: 0.65rem;
            color: #444;
            margin-bottom: 1.5rem;
            text-transform: uppercase;
        }

        .input-group { margin-bottom: 1rem; }

        label { 
            display: block; 
            font-size: 0.7rem; 
            margin-bottom: 5px; 
            color: var(--neon-cyan);
            opacity: 0.7;
        }

        input, select {
            width: 100%;
            background: #000;
            border: 1px solid #222;
            color: var(--neon-cyan);
            padding: 12px;
            font-family: inherit;
            box-sizing: border-box;
            outline: none;
            transition: border 0.3s;
        }

        input:focus { border-color: var(--inst-gold); }

        button {
            width: 100%;
            padding: 14px;
            background: transparent;
            border: 1px solid var(--neon-cyan);
            color: var(--neon-cyan);
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            margin-top: 10px;
            transition: all 0.2s;
        }

        button:hover {
            background: var(--neon-cyan);
            color: #000;
        }

        .btn-emergency {
            border-color: var(--emergency-red);
            color: var(--emergency-red);
            margin-top: 15px;
        }

        .btn-emergency:hover {
            background: var(--emergency-red);
            color: #fff;
        }

        #status-display {
            margin-top: 20px;
            padding: 10px;
            border: 1px dashed #222;
            font-size: 0.75rem;
            background: #000;
            min-height: 1.2rem;
            word-break: break-all;
        }

        /* Scanline CRT Effect */
        #terminal-container::after {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%);
            background-size: 100% 3px;
            pointer-events: none;
        }
    </style>
</head>
<body>

<div id="terminal-container">
    <h2>[ ARC-001 // SECURE_UPLINK ]</h2>
    <div class="sys-info">NODE_STATUS: ONLINE // CORE_v5.6.4 // TRIAD_AUTH: ACTIVE</div>
    
    <div class="input-group">
        <label>SENTINEL_LIAISON_ID</label>
        <input type="text" id="liaisonId" placeholder="Enter Credentials...">
    </div>

    <div class="input-group">
        <label>ASSET_CATEGORY</label>
        <select id="assetCategory">
            <option value="METAL_FERROUS">FERROUS METAL</option>
            <option value="METAL_NON_FERROUS">NON-FERROUS METAL</option>
            <option value="POLY_REFINED">REFINED POLYMER</option>
            <option value="INSTITUTIONAL">INSTITUTIONAL GRADE</option>
        </select>
    </div>

    <div class="input-group">
        <label>METRIC_VALUE (KG)</label>
        <input type="number" id="metricWeight" step="0.01" placeholder="0.00">
    </div>

    <button onclick="transmitData('KILO')">Authorize Sync</button>
    <button class="btn-emergency" onclick="transmitData('INCIDENT')">! Report Field Interaction</button>

    <div id="status-display">SYSTEM_READY // AWAITING_INPUT</div>
</div>

<script>
    // CORE DEPLOYMENT URL
    const DEPLOY_URL = "https://script.google.com/macros/s/AKfycbyjUS2W9nul_bHq1Q9C1B4OU1q8Q3vbqubB4hPX5c9OLRAQwnB2iRAWngQR9COLhCI/exec";

    window.onload = function() {
        const params = new URLSearchParams(window.location.search);
        const status = document.getElementById('status-display');
        
        if (params.get('mode') === 'emergency') {
            document.getElementById('terminal-container').style.borderColor = 'var(--emergency-red)';
            status.innerText = "PROTOCOL_LOCK: EMERGENCY_OVERRIDE";
            status.style.color = 'var(--emergency-red)';
        }
    };

    async function transmitData(type) {
        const status = document.getElementById('status-display');
        const liaison = document.getElementById('liaisonId').value;
        const weight = document.getElementById('metricWeight').value;
        const category = document.getElementById('assetCategory').value;

        if (!liaison) {
            status.innerText = "ERROR // LIAISON_ID_REQUIRED";
            status.style.color = 'var(--emergency-red)';
            return;
        }

        status.innerText = "COMMENCING_UPLINK... SECURING_LEDGER";
        status.style.color = 'var(--inst-gold)';

        const finalUrl = `${DEPLOY_URL}?ReportType=${type}&Liaison=${encodeURIComponent(liaison)}&Weight=${weight}&Category=${encodeURIComponent(category)}`;

        try {
            const response = await fetch(finalUrl);
            const result = await response.text();
            
            if (result.includes("SUCCESS")) {
                status.innerText = result.replace("SUCCESS // ", "SECURE_HASH: ");
                status.style.color = 'var(--neon-cyan)';
                document.getElementById('metricWeight').value = ""; // Reset
            } else {
                throw new Error(result);
            }
        } catch (error) {
            status.innerText = "CRITICAL_UPLINK_FAILURE // CHECK_CONSOLE";
            status.style.color = 'var(--emergency-red)';
            console.error(error);
        }
    }
</script>

</body>
</html>
